site_name: omics-target-prioritization
site_description: Integrate GWAS signals with multi-omics QTLs via colocalization-based variant-to-gene mapping into a calibrated, provenance-tracked target-prioritization score.
site_url: https://abayatibrain.github.io/omics-target-prioritization/
repo_url: https://github.com/abayatibrain/omics-target-prioritization
repo_name: abayatibrain/omics-target-prioritization
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Biology primer: biology.md
  - Architecture: architecture.md
  - Methods: methods.md
  - Decision log:
      - ADR-0001 Coloc V2G: adrs/0001-colocalization-v2g.md
      - ADR-0002 Harmonic sum: adrs/0002-harmonic-sum-aggregation.md
      - ADR-0003 Provenance + confidence: adrs/0003-provenance-and-confidence.md
