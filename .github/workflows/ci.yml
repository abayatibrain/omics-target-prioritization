name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: Ruff lint
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy
        run: |
          uv run mypy \
            src/omics_target_prioritization/models.py \
            src/omics_target_prioritization/simulate.py \
            src/omics_target_prioritization/coloc.py \
            src/omics_target_prioritization/integrate/v2g.py \
            src/omics_target_prioritization/evidence/aggregate.py \
            src/omics_target_prioritization/evidence/confidence.py \
            src/omics_target_prioritization/score/prioritize.py \
            src/omics_target_prioritization/report/dossier.py \
            src/omics_target_prioritization/cli.py
      - name: Pytest
        run: uv run pytest --cov --cov-report=xml --cov-fail-under=70
